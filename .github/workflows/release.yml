name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.platform.name }} installers
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            bundles: msi,nsis
            rust_target: ""
            build_args: --bundles msi,nsis
            apple_signing_identity: ""
          - name: macOS Apple Silicon
            os: macos-latest
            bundles: dmg
            rust_target: aarch64-apple-darwin
            build_args: --target aarch64-apple-darwin --bundles dmg
            apple_signing_identity: "-"
          - name: macOS Intel
            os: macos-15-intel
            bundles: dmg
            rust_target: x86_64-apple-darwin
            build_args: --target x86_64-apple-darwin --bundles dmg
            apple_signing_identity: "-"
    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read release notification marker
        id: release_metadata
        shell: bash
        run: |
          if git tag -l --format='%(contents)' "${{ github.ref_name }}" | grep -Fqi '[notify-update]'; then
            echo "notify_marker=[notify-update]" >> "$GITHUB_OUTPUT"
          else
            echo "notify_marker=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.platform.rust_target != ''
        run: rustup target add ${{ matrix.platform.rust_target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform.apple_signing_identity }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Just Another Music Client ${{ github.ref_name }}"
          releaseBody: |
            Desktop installers for Just Another Music Client.

            ${{ steps.release_metadata.outputs.notify_marker }}

            Windows: download the `.msi` or NSIS setup `.exe`, or the portable `.exe` (no install needed — requires WebView2, included with Windows 10/11).
            macOS: download the Apple Silicon `.dmg` for M-series Macs or the
            Intel `.dmg` for older Intel Macs.

            ## macOS notice

            Because the macOS build is not notarized, you may need to open
            System Settings, go to Privacy & Security, and click **Open Anyway**
            after trying to launch the app for the first time.

            macOS may also show a Keychain access popup. The app stores one
            encryption key in its own Keychain entry. Your YouTube session is
            encrypted with that key before it is saved in the app data directory.
            This popup is expected.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.platform.build_args }}

      - name: Upload Windows portable exe
        if: matrix.platform.name == 'Windows'
        shell: bash
        run: |
          gh release upload ${{ github.ref_name }} "src-tauri/target/release/just-another-music-client.exe#Just-Another-Music-Client-Windows-portable.exe" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify macOS DMG and app signature
        if: startsWith(matrix.platform.name, 'macOS')
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ matrix.platform.rust_target }}" ]; then
            bundle_dir="src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle/dmg"
          else
            bundle_dir="src-tauri/target/release/bundle/dmg"
          fi

          dmg_path="$(find "$bundle_dir" -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$dmg_path"
          hdiutil verify "$dmg_path"

          mount_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_dir" -quiet || true
            rmdir "$mount_dir" || true
          }
          trap cleanup EXIT

          hdiutil attach "$dmg_path" -readonly -nobrowse -mountpoint "$mount_dir"
          app_path="$(find "$mount_dir" -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"